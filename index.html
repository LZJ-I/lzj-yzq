<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LZJ与YZQ的恋爱计时器</title>
    <link href="./assets/styles.css?v=3" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-900/30 via-pink-800/30 to-purple-700/30 min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden">
    
    <!-- 装饰性元素 - 爱心和流星 -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <!-- 爱心元素 -->
        <div class="absolute top-10 left-10 w-16 h-16 text-love/20 heart-beat"><i class="fa fa-heart text-4xl"></i></div>
        <div class="absolute top-20 right-20 w-12 h-12 text-love/20 heart-beat" style="animation-delay: 0.3s"><i class="fa fa-heart text-3xl"></i></div>
        <div class="absolute bottom-40 left-20 w-10 h-10 text-love/20 heart-beat" style="animation-delay: 0.6s"><i class="fa fa-heart text-2xl"></i></div>
        <div class="absolute bottom-20 right-40 w-14 h-14 text-love/20 heart-beat" style="animation-delay: 0.9s"><i class="fa fa-heart text-3xl"></i></div>
        
        <!-- 流星容器 -->
        <div id="meteor-container" class="absolute inset-0 w-full h-full pointer-events-none"></div>
    </div>
    
    <div class="relative z-10 text-center w-full max-w-6xl">
        <!-- 标题 - 可点击切换显示模式 -->
        <h1 id="title" class="text-[clamp(2rem,8vw,5rem)] font-romantic font-bold text-love-dark mb-4 text-shadow float cursor-pointer transition-transform hover:scale-105">
            LZJ<span class="text-love heart-beat">❤</span>YZQ
        </h1>
        
        <!-- 模式提示 -->
        <div class="mb-4 text-love-dark/80 text-sm md:text-base">
            <span class="mode-indicator">点击标题切换显示模式 (当前模式: <span id="currentModeText">天时分秒</span>)</span>
        </div>
        
        <!-- 计时器容器 -->
        <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-4 md:p-6 border border-love/20 mx-auto">
            <p id="timerDesc" class="text-gray-700 text-lg md:text-xl mb-4">我们已经在一起</p>
            
            <!-- 所有时间显示模式的容器 -->
            <div class="w-full">
                <!-- 模式0: 年月日时分秒 - 大屏幕一行，小屏幕自动换行 -->
                <div id="mode0" class="hidden flex flex-wrap justify-center gap-2 md:gap-3 overflow-hidden">
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="years" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">年</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="months" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">月</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="days" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">天</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="hours" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">时</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="minutes" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">分</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="seconds" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">秒</div>
                    </div>
                </div>
                
                <!-- 模式1: 月天时分秒 -->
                <div id="mode1" class="hidden flex flex-wrap justify-center gap-2 md:gap-3 overflow-hidden">
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m1-months" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">月</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m1-days" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">天</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m1-hours" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">时</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m1-minutes" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">分</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m1-seconds" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">秒</div>
                    </div>
                </div>
                
                <!-- 模式2: 周天时分秒 -->
                <div id="mode2" class="hidden flex flex-wrap justify-center gap-2 md:gap-3 overflow-hidden">
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="weeks" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">周</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m2-days" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">天</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m2-hours" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">时</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m2-minutes" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">分</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m2-seconds" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">秒</div>
                    </div>
                </div>
                
                <!-- 模式3: 天时分秒 (默认显示) -->
                <div id="mode3" class="flex flex-wrap justify-center gap-2 md:gap-3 overflow-hidden">
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m3-days" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">天</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m3-hours" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">时</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m3-minutes" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">分</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m3-seconds" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">秒</div>
                    </div>
                </div>
                
                <!-- 模式4: 时分秒 -->
                <div id="mode4" class="hidden flex flex-wrap justify-center gap-2 md:gap-3 overflow-hidden">
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m4-hours" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">时</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m4-minutes" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">分</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m4-seconds" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">秒</div>
                    </div>
                </div>
                
                <!-- 模式5: 分秒 -->
                <div id="mode5" class="hidden flex flex-wrap justify-center gap-2 md:gap-3 overflow-hidden">
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m5-minutes" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">分</div>
                    </div>
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="m5-seconds" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">秒</div>
                    </div>
                </div>
                
                <!-- 模式6: 秒 -->
                <div id="mode6" class="hidden flex justify-center p-3">
                    <div class="time-unit bg-gradient-to-br from-love/5 to-love/10 rounded-xl p-3 transform transition-all hover:scale-105 hover:shadow-lg text-center">
                        <div id="totalSeconds" class="text-2xl md:text-4xl lg:text-5xl font-bold text-love-dark">0</div>
                        <div class="text-gray-600 text-xs md:text-sm mt-1">秒</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer class="mt-6 text-gray-600 text-xs md:text-base italic font-romantic">
            <p id="motto">落日沉溺于橘色的海   晚风沦陷于赤诚的爱。</p>
        </footer>
    </div>

    <script src="./assets/luxon.min.js"></script>
    <script src="./config.js"></script>
    <script>
        const startDate = luxon.DateTime.fromISO(COUPLE_CONFIG.startDate).toJSDate();

        document.title = `${COUPLE_CONFIG.name1}与${COUPLE_CONFIG.name2}的恋爱计时器`;
        document.getElementById('title').innerHTML =
            `${COUPLE_CONFIG.name1}<span class="text-love heart-beat">❤</span>${COUPLE_CONFIG.name2}`;
        document.getElementById('motto').textContent = COUPLE_CONFIG.motto;
        
        // 计时模式：0-年月日时分秒，1-月天时分秒，2-周天时分秒，3-天时分秒(默认)，4-时分秒，5-分秒，6-秒
        let timerMode = 3;  // 设置默认模式为天时分秒
        const totalModes = 7;
        const modeNames = [
            "年月日时分秒",
            "月天时分秒",
            "周天时分秒",
            "天时分秒",
            "时分秒",
            "分秒",
            "秒"
        ];
        
        // 创建流星效果
        function createMeteor() {
            const container = document.getElementById('meteor-container');
            const meteor = document.createElement('div');
            meteor.classList.add('meteor');
            
            // 随机位置和动画时间
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight / 2;
            const duration = 2 + Math.random() * 3;
            
            meteor.style.top = `${startY}px`;
            meteor.style.left = `${startX}px`;
            meteor.style.animationDuration = `${duration}s`;
            
            container.appendChild(meteor);
            
            // 动画结束后移除流星元素
            setTimeout(() => {
                meteor.remove();
            }, duration * 1000);
        }
        
        // 定期创建流星
        setInterval(createMeteor, 1500);
        // 初始创建一些流星
        for (let i = 0; i < 3; i++) {
            setTimeout(createMeteor, i * 500);
        }
        
        // 精确计算两个日期之间的差值（基于 Luxon，日历感知）
        function calculateDateDifference(start, end) {
            const startDT = luxon.DateTime.fromJSDate(start);
            const endDT = luxon.DateTime.fromJSDate(end);

            if (startDT >= endDT) {
                return {
                    years: 0, months: 0, weeks: 0, days: 0,
                    hours: 0, minutes: 0, seconds: 0,
                    totalDays: 0, totalSeconds: 0,
                    daysRemaining: 0
                };
            }

            // 日历分解：年/月/日/时/分/秒（用于年月日相关模式）
            const cal = endDT.diff(startDT, ["years", "months", "days", "hours", "minutes", "seconds"]).toObject();

            // 绝对总量：用于天/周/时分秒等模式
            const totalSeconds = Math.floor(endDT.diff(startDT, "seconds").seconds);
            const totalDays = Math.floor(endDT.diff(startDT, "days").days);

            return {
                years: cal.years,
                months: cal.months,
                days: cal.days,
                hours: cal.hours,
                minutes: cal.minutes,
                seconds: Math.floor(cal.seconds),
                weeks: Math.floor(totalDays / 7),
                daysRemaining: totalDays % 7,
                totalDays,
                totalSeconds
            };
        }
        
        // 更新计时器的函数
        function updateTimer() {
            const now = new Date();
            const diff = calculateDateDifference(startDate, now);
            
            // 更新所有可能用到的数据
            document.getElementById('years').textContent = diff.years;
            document.getElementById('months').textContent = diff.months;
            document.getElementById('days').textContent = diff.days;
            document.getElementById('hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(diff.seconds).padStart(2, '0');
            document.getElementById('weeks').textContent = diff.weeks;
            document.getElementById('totalSeconds').textContent = diff.totalSeconds;
            
            // 模式1: 月天时分秒
            document.getElementById('m1-months').textContent = diff.months + diff.years * 12;
            document.getElementById('m1-days').textContent = diff.days;
            document.getElementById('m1-hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('m1-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m1-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式2: 周天时分秒
            document.getElementById('m2-days').textContent = diff.daysRemaining;
            document.getElementById('m2-hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('m2-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m2-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式3: 天时分秒
            document.getElementById('m3-days').textContent = diff.totalDays;
            document.getElementById('m3-hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('m3-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m3-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式4: 时分秒
            const totalHours = diff.totalDays * 24 + diff.hours;
            document.getElementById('m4-hours').textContent = totalHours;
            document.getElementById('m4-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m4-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式5: 分秒
            const totalMinutes = totalHours * 60 + diff.minutes;
            document.getElementById('m5-minutes').textContent = totalMinutes;
            document.getElementById('m5-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 更新当前模式文本显示
            document.getElementById('currentModeText').textContent = modeNames[timerMode];
            
            // 根据当前模式显示对应的计时器
            for (let i = 0; i < totalModes; i++) {
                document.getElementById(`mode${i}`).classList.add('hidden');
            }
            document.getElementById(`mode${timerMode}`).classList.remove('hidden');
        }
        
        // 确保DOM加载完成后再绑定事件
        document.addEventListener('DOMContentLoaded', function() {
            // 获取标题元素
            const titleElement = document.getElementById('title');
            
            // 绑定点击事件
            if (titleElement) {
                titleElement.addEventListener('click', () => {
                    // 切换到下一个模式
                    timerMode = (timerMode + 1) % totalModes;
                    updateTimer();
                    
                    // 添加点击反馈动画
                    titleElement.classList.add('scale-90');
                    setTimeout(() => {
                        titleElement.classList.remove('scale-90');
                    }, 150);
                });
                
                // 初始更新一次
                updateTimer();
            }
        });
        
        // 每秒更新一次计时器
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
