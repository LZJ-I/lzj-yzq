    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .heart-beat {
                animation: heartbeat 1.5s ease-in-out infinite;
            }
            .float {
                animation: float 3s ease-in-out infinite;
            }
            .meteor {
                position: absolute;
                background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
                border-radius: 50%;
                transform-origin: top right;
                animation: meteor 3s linear infinite;
            }
            .mode-indicator {
                animation: pulse 2s infinite;
            }
            .time-unit {
                /* 关键修改：移除固定宽度限制，让内容决定宽度 */
                white-space: nowrap; /* 防止内容换行 */
                flex: none; /* 取消flex拉伸，按内容大小显示 */
            }
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes meteor {
            0% {
                width: 0;
                height: 2px;
                transform: rotate(-30deg) translateX(0);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {

            }
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; }

            100% { opacity: 0.6; }
        }
    </style>

    <script>
        // 起始日期：2023年2月14日晚上7点22分
        const startDate = new Date(2023, 1, 14, 19, 22, 0);
        
        // 计时模式：0-年月日时分秒，1-月天时分秒，2-周天时分秒，3-天时分秒(默认)，4-时分秒，5-分秒，6-秒
        let timerMode = 3;  // 设置默认模式为天时分秒
        const totalModes = 7;
        const modeNames = [
            "年月日时分秒",
            "月天时分秒",
            "周天时分秒",
            "天时分秒",
            "时分秒",
            "分秒",
            "秒"
        ];
        
        // 创建流星效果
        function createMeteor() {
            const container = document.getElementById('meteor-container');
            const meteor = document.createElement('div');
            meteor.classList.add('meteor');
            
            // 随机位置和动画时间
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight / 2;
            const duration = 2 + Math.random() * 3;
            
            meteor.style.top = `${startY}px`;
            meteor.style.left = `${startX}px`;
            meteor.style.animationDuration = `${duration}s`;
            
            container.appendChild(meteor);
            
            // 动画结束后移除流星元素
            setTimeout(() => {
                meteor.remove();
            }, duration * 1000);
        }
        
        // 定期创建流星
        setInterval(createMeteor, 1500);
        // 初始创建一些流星
        for (let i = 0; i < 3; i++) {
            setTimeout(createMeteor, i * 500);
        }
        
        // 获取某月的天数
        function getDaysInMonth(year, month) {
            return new Date(year, month + 1, 0).getDate();
        }
        
        // 精确计算两个日期之间的差值
        function calculateDateDifference(start, end) {
            // 如果开始日期在结束日期之后，返回0
            if (start > end) {
                return { 
                    years: 0, months: 0, weeks: 0, days: 0, 
                    hours: 0, minutes: 0, seconds: 0,
                    totalDays: 0, totalSeconds: 0,
                    daysRemaining: 0
                };
            }
            
            // 计算总毫秒数差值
            const totalMs = end - start;
            const totalSeconds = Math.floor(totalMs / 1000);
            const totalDays = Math.floor(totalSeconds / (60 * 60 * 24));
            const weeks = Math.floor(totalDays / 7);
            const daysRemaining = totalDays % 7;
            
            // 计算年月日
            let years = 0;
            let months = 0;
            let days = 0;
            
            let currentYear = start.getFullYear();
            let currentMonth = start.getMonth();
            
            // 计算年
            while (currentYear < end.getFullYear()) {
                const nextYear = currentYear + 1;
                const endOfYear = new Date(nextYear, 0, 1);
                
                if (endOfYear <= end) {
                    years++;
                    currentYear = nextYear;
                } else {
                    break;
                }
            }
            
            // 计算月
            while (currentMonth < end.getMonth() || currentYear < end.getFullYear()) {
                const nextMonth = currentMonth + 1;
                const endOfMonth = new Date(currentYear, nextMonth, 1);
                
                if (endOfMonth <= end) {
                    months++;
                    currentMonth = nextMonth;
                    if (currentMonth > 11) {
                        currentMonth = 0;
                        currentYear++;
                    }
                } else {
                    break;
                }
            }
            
            // 计算日
            days = end.getDate() - start.getDate();
            if (days < 0) {
                // 如果日期为负，需要从上个月借位
                const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
                const prevMonthDays = getDaysInMonth(currentYear, prevMonth);
                days += prevMonthDays;
                months--;
                if (months < 0) {
                    months = 11;
                    years--;
                }
            }
            
            // 计算时分秒，处理负数情况
            let hours = end.getHours() - start.getHours();
            let minutes = end.getMinutes() - start.getMinutes();
            let seconds = end.getSeconds() - start.getSeconds();
            
            // 处理秒数为负的情况
            if (seconds < 0) {
                seconds += 60;
                minutes--;
            }
            
            // 处理分钟为负的情况
            if (minutes < 0) {
                minutes += 60;
                hours--;
            }
            
            // 处理小时为负的情况
            if (hours < 0) {
                hours += 24;
                days--;
                
                // 如果天数变为负数，需要调整月份
                if (days < 0) {
                    const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
                    const prevMonthDays = getDaysInMonth(currentYear, prevMonth);
                    days += prevMonthDays;
                    months--;
                    if (months < 0) {
                        months = 11;
                        years--;
                    }
                }
            }
            
            return { 
                years, months, weeks, days, 
                hours, minutes, seconds,
                totalDays, totalSeconds,
                daysRemaining
            };
        }
        
        // 更新计时器的函数
        function updateTimer() {
            const now = new Date();
            const diff = calculateDateDifference(startDate, now);
            
            // 更新所有可能用到的数据
            document.getElementById('years').textContent = diff.years;
            document.getElementById('months').textContent = diff.months;
            document.getElementById('days').textContent = diff.days;
            document.getElementById('hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(diff.seconds).padStart(2, '0');
            document.getElementById('weeks').textContent = diff.weeks;
            document.getElementById('totalSeconds').textContent = diff.totalSeconds;
            
            // 模式1: 月天时分秒
            document.getElementById('m1-months').textContent = diff.months + diff.years * 12;
            document.getElementById('m1-days').textContent = diff.days;
            document.getElementById('m1-hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('m1-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m1-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式2: 周天时分秒
            document.getElementById('m2-days').textContent = diff.daysRemaining;
            document.getElementById('m2-hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('m2-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m2-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式3: 天时分秒
            document.getElementById('m3-days').textContent = diff.totalDays;
            document.getElementById('m3-hours').textContent = String(diff.hours).padStart(2, '0');
            document.getElementById('m3-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m3-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式4: 时分秒
            const totalHours = diff.totalDays * 24 + diff.hours;
            document.getElementById('m4-hours').textContent = totalHours;
            document.getElementById('m4-minutes').textContent = String(diff.minutes).padStart(2, '0');
            document.getElementById('m4-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 模式5: 分秒
            const totalMinutes = totalHours * 60 + diff.minutes;
            document.getElementById('m5-minutes').textContent = totalMinutes;
            document.getElementById('m5-seconds').textContent = String(diff.seconds).padStart(2, '0');
            
            // 更新当前模式文本显示
            document.getElementById('currentModeText').textContent = modeNames[timerMode];
            
            // 根据当前模式显示对应的计时器
            for (let i = 0; i < totalModes; i++) {
                document.getElementById(`mode${i}`).classList.add('hidden');
            }
            document.getElementById(`mode${timerMode}`).classList.remove('hidden');
        }
        
        // 确保DOM加载完成后再绑定事件
        document.addEventListener('DOMContentLoaded', function() {
            // 获取标题元素
            const titleElement = document.getElementById('title');
            
            // 绑定点击事件
            if (titleElement) {
                titleElement.addEventListener('click', () => {
                    // 切换到下一个模式
                    timerMode = (timerMode + 1) % totalModes;
                    updateTimer();
                    
                    // 添加点击反馈动画
                    titleElement.classList.add('scale-90');
                    setTimeout(() => {
                        titleElement.classList.remove('scale-90');
                    }, 150);
                });
                
                // 初始更新一次
                updateTimer();
            }
        });
        
        // 每秒更新一次计时器
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
